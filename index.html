<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>吃啥都行</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    body {
      background: #f9fafb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 35px 30px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 450px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #ff6b6b;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .desc {
      color: #666;
      margin-bottom: 25px;
    }

    .food-box {
      background: #fff5f5;
      padding: 20px;
      border-radius: 16px;
      margin: 20px 0;
    }

    .food-item {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      padding: 10px;
      margin: 6px 0;
      background: white;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .collect-btn {
      background: #ffd43b;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn {
      background: #4dabf7;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 50px;
      font-size: 16px;
      margin: 8px;
      cursor: pointer;
    }

    .btn-green {
      background: #51cf66;
    }

    .input-box {
      margin: 20px 0;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 10px;
      outline: none;
    }

    .tip {
      color: #999;
      font-size: 13px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🍽️ 吃啥都行</h1>
    <p class="desc">随机推荐3个菜 · 必含一个你收藏的</p>

    <div class="food-box" id="foodContainer"></div>

    <button class="btn" onclick="refreshFood()">🔄 换一批</button>
    <button class="btn btn-green" onclick="goCollect()">⭐ 我的收藏</button>

    <div class="input-box">
      <input type="text" id="userFood" placeholder="输入你想推荐的菜品">
      <button class="btn" onclick="submitFood()">📤 推荐菜品给管理员</button>
      <p class="tip">推荐后，管理员会尽快审核加入菜单</p>
    </div>
  </div>

  <script>
    // 系统菜品库
    const systemFoods = [
      "麻辣烫","火锅","烧烤","炸鸡","螺蛳粉","牛肉面","饺子","炒饭",
      "米线","日料","披萨","黄焖鸡","麻辣香锅","酸菜鱼","烤肉饭","冒菜"
    ];

    // 读取本地收藏
    let myCollection = JSON.parse(localStorage.getItem("myCollection")) || [];

    // 随机推荐 3 个，其中 1 个必为收藏
    function getThreeFoods() {
      let collect = [...myCollection];
      let system = [...systemFoods];

      if (collect.length === 0) {
        collect = ["快去收藏喜欢的菜品～"];
      }

      // 随机一个收藏
      let mustCollect = collect[Math.floor(Math.random() * collect.length)];
      
      // 随机两个系统菜
      let shuffled = system.sort(() => 0.5 - Math.random()).slice(0, 2);
      
      // 合并并打乱
      let result = [mustCollect, ...shuffled].sort(() => 0.5 - Math.random());
      return result;
    }

    // 显示到页面
    function refreshFood() {
      let list = getThreeFoods();
      let html = "";
      list.forEach(f => {
        html += `
        <div class="food-item">
          ${f}
          <button class="collect-btn" onclick="collectThis('${f}')">⭐ 收藏</button>
        </div>`;
      });
      document.getElementById("foodContainer").innerHTML = html;
    }

    // 收藏菜品
    function collectThis(food) {
      if (!myCollection.includes(food)) {
        myCollection.push(food);
        localStorage.setItem("myCollection", JSON.stringify(myCollection));
        alert(food + " 已收藏！");
      } else {
        alert(food + " 已经收藏过啦");
      }
    }

    // 查看收藏
    function goCollect() {
      if (myCollection.length === 0) {
        alert("你还没有收藏任何菜品");
        return;
      }
      alert("你的收藏：\n" + myCollection.join("\n"));
    }

    // 用户推荐菜品 → 通知管理员（这里跳转到你的消息渠道）
    function submitFood() {
      let food = document.getElementById("userFood").value.trim();
      if (!food) {
        alert("请输入菜品名称");
        return;
      }

      // 发送通知（你可以把下面网址改成你的微信/QQ/表单/邮箱等）
      let msg = `用户推荐菜品：${food}`;
      let yourNotifyUrl = "https://wxpusher.link/your-channel?msg=" + encodeURIComponent(msg);
      window.open(yourNotifyUrl, "_blank");

      alert("推荐成功！等待管理员审核");
      document.getElementById("userFood").value = "";
    }

    // 页面加载自动推荐
    window.onload = refreshFood;
  </script>
</body>
</html>
